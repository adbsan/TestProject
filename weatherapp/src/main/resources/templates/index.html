<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>天気予報アプリ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', 'Hiragino Sans', 'Yu Gothic', sans-serif;
      color: #e0e0e0;
      padding: 40px 16px;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: #00d4ff;
      text-align: center;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
      letter-spacing: 0.05em;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #8892a4;
      text-align: center;
      margin-bottom: 36px;
    }

    .search-form {
      display: flex;
      gap: 10px;
      justify-content: center;
      align-items: center;
      width: 100%;
      max-width: 500px;
      margin-bottom: 40px;
    }

    .search-form input[type="text"] {
      flex: 1;
      padding: 14px 18px;
      border: 2px solid #2a3a5c;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.07);
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-form input[type="text"]::placeholder { color: #556080; }
    .search-form input[type="text"]:focus { border-color: #00d4ff; }

    .search-form button {
      padding: 14px 28px;
      background: #00d4ff;
      color: #0f1a2e;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .search-form button:hover  { background: #00b8db; }
    .search-form button:active { transform: scale(0.97); }

    .error-banner {
      background: rgba(255, 80, 80, 0.15);
      border: 1px solid rgba(255, 80, 80, 0.4);
      border-radius: 12px;
      padding: 14px 24px;
      text-align: center;
      color: #ff8080;
      max-width: 500px;
      width: 100%;
      margin-bottom: 20px;
      font-size: 0.95rem;
    }

    .weather-card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 40px 56px;
      text-align: center;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .city-name {
      font-size: 1.8rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 4px;
    }

    .weather-icon {
      width: 100px;
      height: 100px;
      margin: 8px auto;
      display: block;
      filter: drop-shadow(0 0 12px rgba(0, 212, 255, 0.5));
    }

    .temperature {
      font-size: 3.8rem;
      font-weight: 800;
      color: #00d4ff;
      line-height: 1;
      margin-bottom: 8px;
    }

    .description {
      font-size: 1.1rem;
      color: #a0b0c8;
      margin-bottom: 28px;
    }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .detail-item {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      padding: 16px 12px;
    }

    .detail-label {
      font-size: 0.75rem;
      color: #6070a0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .detail-value {
      font-size: 1.3rem;
      font-weight: 700;
      color: #e0e0e0;
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.8rem; }
      .weather-card { padding: 28px 20px; }
      .temperature { font-size: 3rem; }
    }
  </style>
</head>
<body>

  <h1>&#9925; 天気予報</h1>
  <p class="subtitle">都市名を入力して現在の天気を確認しましょう</p>

  <form class="search-form" th:action="@{/}" method="get">
    <input type="text"
           name="city"
           placeholder="都市名を入力（例: Tokyo, Osaka）"
           th:value="${searchedCity}"
           autocomplete="off"
           autofocus/>
    <button type="submit">検索</button>
  </form>

  <div class="error-banner" th:if="${errorMessage}">
    <span th:text="${errorMessage}">エラーメッセージ</span>
  </div>

  <div class="weather-card" th:if="${weather}">

    <div class="city-name" th:text="${weather.cityName}">都市名</div>

    <img class="weather-icon"
         th:src="${weather.iconUrl}"
         th:alt="${weather.description}"
         alt="天気アイコン"/>

    <div class="temperature">
      <span th:text="${#numbers.formatDecimal(weather.temperature, 1, 1)}">--</span>°C
    </div>

    <div class="description" th:text="${weather.description}">晴れ</div>

    <div class="details-grid">
      <div class="detail-item">
        <div class="detail-label">湿度</div>
        <div class="detail-value">
          <span th:text="${weather.humidity}">--</span>%
        </div>
      </div>
      <div class="detail-item">
        <div class="detail-label">風速</div>
        <div class="detail-value">
          <span th:text="${#numbers.formatDecimal(weather.windSpeed, 1, 1)}">--</span> m/s
        </div>
      </div>
    </div>

  </div>

</body>
</html>
